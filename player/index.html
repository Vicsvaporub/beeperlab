<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>🛸 UFO Radio</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="player">

    <div class="titlebar">

        <span>🛸 UFO Radio v1.0</span>

        <div class="window-buttons">
            <button>─</button>
            <button>□</button>
            <button>✕</button>
        </div>

    </div>

    <div class="display">

        <div id="nowPlaying">

            <small>NOW PLAYING</small>

            <h2>Select a track...</h2>

        </div>

        <audio id="audio" controls preload="metadata"></audio>

    </div>

    <div class="playlist">

        <h3>PLAYLIST</h3>

        <ul id="playlist"></ul>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
